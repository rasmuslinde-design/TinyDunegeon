<!DOCTYPE html>
<html>
<head>
<style>
body { background: #222; color: #fff; font-family: monospace; font-size: 10px; }
.grid { display: flex; flex-wrap: wrap; gap: 2px; }
.tile { position: relative; width: 48px; height: 48px; border: 1px solid #444; }
.tile span { position: absolute; bottom: 0; left: 0; background: rgba(0,0,0,0.8); color: #ff0; font-size: 8px; padding: 1px; }
</style>
</head>
<body>
<h2>Tilemap — 12×11 grid (192×176px, tile=16px)</h2>
<div class="grid" id="g"></div>
<script>
const COLS=12, ROWS=11, SZ=16, SCALE=3;
const g = document.getElementById('g');
for(let r=0;r<ROWS;r++){
  for(let c=0;c<COLS;c++){
    const idx = r*COLS+c;
    const d = document.createElement('div');
    d.className='tile';
    d.style.cssText=`
      background-image:url('/Tilemap/tilemap_packed.png');
      background-position:-${c*SZ*SCALE}px -${r*SZ*SCALE}px;
      background-size:${COLS*SZ*SCALE}px auto;
      image-rendering:pixelated;
    `;
    d.innerHTML=`<span>${idx}<br>r${r}c${c}</span>`;
    g.appendChild(d);
  }
}
</script>
</body>
</html>
